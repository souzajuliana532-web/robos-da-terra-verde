<!DOCTYPE html>\n<html lang=\"pt-BR\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Relógio Digital - Fusos Horários</title>\n    <link rel=\"stylesheet\" href=\"clock-style.css\">\n</head>\n<body>\n    <div class=\"container\">\n        <!-- Header -->\n        <header class=\"header\">\n            <h1>🕐 Relógio Digital em Diferentes Fusos Horários</h1>\n            <p class=\"subtitle\">Hora ao redor do mundo em tempo real</p>\n        </header>\n\n        <!-- Controls -->\n        <div class=\"controls\">\n            <button class=\"control-btn\" id=\"add-timezone\">+ Adicionar Fuso Horário</button>\n            <button class=\"control-btn reset-btn\" id=\"reset-timezones\">↺ Restaurar Padrão</button>\n            <div class=\"format-toggle\">\n                <label>\n                    <input type=\"checkbox\" id=\"toggle-format\" checked>\n                    Formato 24h\n                </label>\n            </div>\n        </div>\n\n        <!-- Timezones Grid -->\n        <div class=\"timezones-grid\" id=\"timezones-grid\">\n            <!-- Clocks will be generated here by JavaScript -->\n        </div>\n\n        <!-- Timezone Selector Modal -->\n        <div class=\"modal\" id=\"timezone-modal\">\n            <div class=\"modal-content\">\n                <div class=\"modal-header\">\n                    <h2>Selecione um Fuso Horário</h2>\n                    <button class=\"close-btn\" id=\"close-modal\">&times;</button>\n                </div>\n                <div class=\"timezone-list\" id=\"timezone-list\">\n                    <!-- Timezone options will be generated here -->\n                </div>\n            </div>\n        </div>\n    </div>\n\n    <script src=\"clock-script.js\"></script>\n</body>\n</html>"
